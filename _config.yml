# Setup
title: Seohyeon Park
description: Hi! I'm a MS-PhD integrated student at PILAB, SNU. My main research interests are VLA and 3D Vision.
url: "https://eainx.github.io"
baseurl: "" # 하위 경로 문제가 생기지 않도록 명시적으로 비워둡니다.
avatar: assets/profile.jpg
permalink: pretty
cover_image: 

# Plugins (중복을 제거하고 하나로 통합했습니다)
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-remote-theme

# Theme
remote_theme: vszhub/not-pure-poole

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# SEO & Social
logo: logo.png
social:
  name: Seohyeon Park
  links:
    - https://github.com/eainx
google_site_verification: xxxxx # 본인의 실제 인증 코드로 유지하세요.
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Author Information
author:
  name: Seohyeon Park
  url: https://eainx.github.io
  email: seohyun423@snu.ac.kr